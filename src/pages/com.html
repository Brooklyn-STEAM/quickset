<!-- TOP BAR -->
<div class="max-w-3xl mx-auto mt-6 flex flex-col md:flex-row gap-3 justify-between">

  <!-- New Post -->

    New Post
  </button>

</div>

<!-- CATEGORY FILTERS -->

  <button class="bg-gray-200 px-3 py-1 rounded-full text-sm">

  </button>

  <button class="bg-gray-200 px-3 py-1 rounded-full text-sm">

  </button>

  <button class="bg-gray-200 px-3 py-1 rounded-full text-sm">

  </button>

</div>
